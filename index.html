<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Weekmenu & Recepten</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F3ED;
    --warm-white: #FDFAF6;
    --brown: #2C1F14;
    --brown-mid: #5C4033;
    --brown-light: #A07855;
    --green: #4A6741;
    --green-light: #E8EFE7;
    --accent: #C4622D;
    --accent-light: #F5E6DC;
    --border: rgba(44,31,20,0.12);
    --shadow: 0 2px 20px rgba(44,31,20,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--brown);
    padding: 2rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 40px;
    background: var(--cream);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .header-inner { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--cream);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  header h1 em { font-style: italic; color: #E8A87C; }
  header p {
    color: rgba(247,243,237,0.6);
    font-size: 0.85rem;
    margin-top: 0.4rem;
    font-weight: 300;
  }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 1.4rem;
    color: var(--brown);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* WEEK NAV */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .week-label {
    font-size: 0.85rem;
    color: var(--brown-mid);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 14px;
    color: var(--brown-mid);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--brown); color: var(--cream); border-color: var(--brown); }

  /* WEEK GRID */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 2.5rem;
  }
  @media (max-width: 600px) {
    .week-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 380px) {
    .week-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .day-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 10px;
    min-height: 110px;
    display: flex; flex-direction: column;
    transition: box-shadow 0.2s;
    position: relative;
    cursor: pointer;
  }
  .day-card:hover { box-shadow: var(--shadow); }
  .day-card.today {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .day-card.today .day-name { color: var(--accent); }
  .day-name {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--brown-light);
    margin-bottom: 2px;
  }
  .day-date {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 300;
    color: var(--brown);
    margin-bottom: 8px;
  }
  .day-meal {
    font-size: 12px;
    font-weight: 500;
    color: var(--brown);
    line-height: 1.3;
    flex: 1;
  }
  .day-cook {
    font-size: 11px;
    color: var(--green);
    font-weight: 500;
    margin-top: 6px;
    background: var(--green-light);
    display: inline-block;
    padding: 2px 7px;
    border-radius: 999px;
  }
  .day-empty {
    font-size: 11px;
    color: rgba(44,31,20,0.25);
    font-style: italic;
  }
  .edit-icon {
    position: absolute; top: 8px; right: 8px;
    opacity: 0; transition: opacity 0.15s;
    font-size: 12px; color: var(--brown-light);
  }
  .day-card:hover .edit-icon { opacity: 1; }

  /* RECEPTEN */
  .recepten-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }
  .recept-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .recept-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .recept-card.favoriet::after {
    content: '★';
    position: absolute; top: 10px; right: 12px;
    color: #E8A87C; font-size: 14px;
  }
  .recept-naam {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 1rem;
    color: var(--brown);
    margin-bottom: 6px;
    padding-right: 16px;
  }
  .recept-meta { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .tag-type { background: var(--accent-light); color: var(--accent); }
  .tag-keuken { background: var(--green-light); color: var(--green); }
  .tag-tijd { background: #EEF0F8; color: #3A4A7A; }
  .tag-moei { background: #F5F5E8; color: #5A5A2A; }

  .recept-link-btn {
    display: inline-block; margin-top: 8px;
    font-size: 11px; font-weight: 500;
    color: var(--accent); text-decoration: none;
    background: var(--accent-light);
    padding: 3px 10px; border-radius: 999px;
    transition: background 0.15s;
  }
  .recept-link-btn:hover { background: #EDCBB8; }

  /* ADD RECEPT BTN */
  .add-recept-btn {
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    color: var(--brown-light);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    transition: all 0.2s;
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-recept-btn:hover { border-color: var(--brown-mid); color: var(--brown); background: var(--warm-white); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,31,20,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 1.75rem;
    width: 100%; max-width: 420px;
    transform: translateY(10px);
    transition: transform 0.2s;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400; font-size: 1.3rem;
    margin-bottom: 1.25rem; color: var(--brown);
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--brown-light); margin-bottom: 5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--brown);
    background: white;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
  .btn {
    padding: 9px 18px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; border: 1px solid var(--border);
  }
  .btn-primary { background: var(--brown); color: var(--cream); border-color: var(--brown); }
  .btn-primary:hover { background: var(--brown-mid); }
  .btn-secondary { background: transparent; color: var(--brown-mid); }
  .btn-secondary:hover { background: var(--cream); }
  .btn-danger { background: transparent; color: #C0392B; border-color: transparent; margin-right: auto; }
  .btn-danger:hover { background: #FDECEA; }

  /* PINCODE */
  .pin-overlay {
    position: fixed; inset: 0;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 1.5rem;
    padding: 2rem;
  }
  .pin-overlay.verborgen { display: none; }
  .pin-titel {
    font-family: 'Fraunces', serif;
    font-weight: 300; font-size: 1.8rem;
    color: var(--brown); text-align: center;
  }
  .pin-titel em { font-style: italic; color: var(--accent); }
  .pin-sub { font-size: 14px; color: var(--brown-light); text-align: center; }
  .pin-invoer { display: flex; gap: 12px; }
  .pin-vak {
    width: 52px; height: 64px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: var(--warm-white);
    font-family: 'Fraunces', serif;
    font-size: 1.8rem; font-weight: 300;
    text-align: center; color: var(--brown);
    outline: none; transition: border-color 0.15s;
  }
  .pin-vak:focus { border-color: var(--accent); }
  .pin-fout { font-size: 13px; color: var(--accent); text-align: center; min-height: 20px; }

  /* FOOTER */
  footer {
    text-align: center; padding: 2rem;
    font-size: 12px; color: var(--brown-light);
  }
</style>
</head>
<body>

<div class="pin-overlay" id="pinOverlay">
  <div class="pin-titel">Weekmenu &amp; <em>Recepten</em></div>
  <div class="pin-sub">Voer de pincode in om verder te gaan</div>
  <div class="pin-invoer">
    <input class="pin-vak" id="p1" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
    <input class="pin-vak" id="p2" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
    <input class="pin-vak" id="p3" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
    <input class="pin-vak" id="p4" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]">
  </div>
  <div class="pin-fout" id="pinFout"></div>
</div>

<header>
  <div class="header-inner">
    <h1>Weekmenu &amp; <em>Recepten</em></h1>
  </div>
</header>

<main>
  <!-- WEEKMENU -->
  <div class="week-nav">
    <div class="week-label" id="weekLabel"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeWeek(-1)">&#8592;</button>
      <button class="nav-btn" onclick="changeWeek(0)">&#9675;</button>
      <button class="nav-btn" onclick="changeWeek(1)">&#8594;</button>
    </div>
  </div>

  <h2 class="section-title"><span></span>Weekmenu</h2>
  <div class="week-grid" id="weekGrid"></div>

  <!-- RECEPTEN -->
  <h2 class="section-title"><span></span>Recepten</h2>
  <div class="recepten-grid" id="receptenGrid"></div>
</main>

<footer>Gezinsplanner &mdash; bijgehouden door de familie</footer>

<!-- MODAL DAG BEWERKEN -->
<div class="modal-overlay" id="dagModal">
  <div class="modal">
    <h2 id="dagModalTitle">Dag bewerken</h2>
    <div class="form-group">
      <label>Gerecht</label>
      <input type="text" id="dagGerecht" placeholder="Wat eten we?" list="receptSuggesties">
      <datalist id="receptSuggesties"></datalist>
    </div>
    <div class="form-group">
      <label>Wie kookt</label>
      <select id="dagKookt">
        <option value="">— kies een kok —</option>
        <option>Jeroen</option>
        <option>Caroline</option>
        <option>Marloes</option>
        <option>Wouter</option>
        <option>Sjoerd</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notities</label>
      <textarea id="dagNotities" placeholder="Bijzonderheden, allergieën, etc."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="dagVerwijderBtn" onclick="verwijderDag()">Verwijderen</button>
      <button class="btn btn-secondary" onclick="sluitModal('dagModal')">Annuleren</button>
      <button class="btn btn-primary" onclick="slaaDagOp()">Opslaan</button>
    </div>
  </div>
</div>

<!-- MODAL RECEPT TOEVOEGEN -->
<div class="modal-overlay" id="receptModal">
  <div class="modal">
    <h2 id="receptModalTitle">Recept toevoegen</h2>
    <div class="form-group">
      <label>Naam</label>
      <input type="text" id="receptNaam" placeholder="Naam van het gerecht">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="receptType">
          <option>Diner</option>
          <option>Lunch</option>
          <option>Ontbijt</option>
          <option>Snack</option>
        </select>
      </div>
      <div class="form-group">
        <label>Keuken</label>
        <select id="receptKeuken">
          <option>Nederlands</option>
          <option>Italiaans</option>
          <option>Aziatisch</option>
          <option>Overig</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Kooktijd (min)</label>
        <input type="number" id="receptTijd" placeholder="30">
      </div>
      <div class="form-group">
        <label>Moeilijkheid</label>
        <select id="receptMoei">
          <option>Makkelijk</option>
          <option>Gemiddeld</option>
          <option>Moeilijk</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Link recept (optioneel)</label>
      <input type="url" id="receptLink" placeholder="https://...">
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="receptFavoriet" style="margin-right:6px">Favoriet</label>
    </div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="receptVerwijderBtn" onclick="verwijderRecept()">Verwijderen</button>
      <button class="btn btn-secondary" onclick="sluitModal('receptModal')">Annuleren</button>
      <button class="btn btn-primary" onclick="slaaReceptOp()">Opslaan</button>
    </div>
  </div>
</div>

<script>
const DAGEN = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
const DAGEN_LANG = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
const MAANDEN = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

let weekOffset = 0;
let activeDagKey = null;
let activeReceptIdx = null;

// DATA
let menu = JSON.parse(localStorage.getItem('gp_menu') || '{}');
let recepten = JSON.parse(localStorage.getItem('gp_recepten') || 'null') || [
  { naam: 'Spaghetti Bolognese', type: 'Diner', keuken: 'Italiaans', tijd: 45, moei: 'Makkelijk', link: '', favoriet: true },
  { naam: 'Kippensoep', type: 'Diner', keuken: 'Nederlands', tijd: 60, moei: 'Gemiddeld', link: '', favoriet: false },
  { naam: 'Pad Thai', type: 'Diner', keuken: 'Aziatisch', tijd: 30, moei: 'Gemiddeld', link: '', favoriet: true },
];

function slaOp() {
  localStorage.setItem('gp_menu', JSON.stringify(menu));
  localStorage.setItem('gp_recepten', JSON.stringify(recepten));
}

function getMaandagVan(offset) {
  const nu = new Date();
  const dag = nu.getDay();
  const diff = dag === 0 ? -6 : 1 - dag;
  const ma = new Date(nu);
  ma.setDate(nu.getDate() + diff + offset * 7);
  ma.setHours(0,0,0,0);
  return ma;
}

function dagKey(date) {
  return date.toISOString().slice(0,10);
}

function changeWeek(dir) {
  if (dir === 0) weekOffset = 0;
  else weekOffset += dir;
  renderWeek();
}

function renderWeek() {
  const ma = getMaandagVan(weekOffset);
  const zo = new Date(ma); zo.setDate(ma.getDate() + 6);
  document.getElementById('weekLabel').textContent =
    `${ma.getDate()} ${MAANDEN[ma.getMonth()]} – ${zo.getDate()} ${MAANDEN[zo.getMonth()]} ${zo.getFullYear()}`;

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  const vandaag = dagKey(new Date());

  for (let i = 0; i < 7; i++) {
    const d = new Date(ma); d.setDate(ma.getDate() + i);
    const key = dagKey(d);
    const data = menu[key] || {};
    const isVandaag = key === vandaag;

    const card = document.createElement('div');
    card.className = 'day-card' + (isVandaag ? ' today' : '');
    card.innerHTML = `
      <div class="day-name">${DAGEN[d.getDay()]}</div>
      <div class="day-date">${d.getDate()}</div>
      ${data.gerecht
        ? `<div class="day-meal">${data.gerecht}</div>${data.kookt ? `<div class="day-cook">${data.kookt}</div>` : ''}`
        : `<div class="day-empty">nog niets gepland</div>`}
      <div class="edit-icon">✎</div>
    `;
    card.onclick = () => openDagModal(key, d, data);
    grid.appendChild(card);
  }

  // update datalist
  const dl = document.getElementById('receptSuggesties');
  dl.innerHTML = recepten.map(r => `<option value="${r.naam}">`).join('');
}

function openDagModal(key, date, data) {
  activeDagKey = key;
  document.getElementById('dagModalTitle').textContent =
    `${DAGEN_LANG[date.getDay()]} ${date.getDate()} ${MAANDEN[date.getMonth()]}`;
  document.getElementById('dagGerecht').value = data.gerecht || '';
  document.getElementById('dagKookt').value = data.kookt || '';
  document.getElementById('dagNotities').value = data.notities || '';
  document.getElementById('dagVerwijderBtn').style.display = data.gerecht ? 'block' : 'none';
  document.getElementById('dagModal').classList.add('open');
}

function slaaDagOp() {
  menu[activeDagKey] = {
    gerecht: document.getElementById('dagGerecht').value.trim(),
    kookt: document.getElementById('dagKookt').value,
    notities: document.getElementById('dagNotities').value.trim(),
  };
  slaOp(); sluitModal('dagModal'); renderWeek();
}

function verwijderDag() {
  delete menu[activeDagKey];
  slaOp(); sluitModal('dagModal'); renderWeek();
}

function renderRecepten() {
  const grid = document.getElementById('receptenGrid');
  grid.innerHTML = '';
  recepten.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'recept-card' + (r.favoriet ? ' favoriet' : '');
    card.innerHTML = `
      <div class="recept-naam">${r.naam}</div>
      <div class="recept-meta">
        <span class="tag tag-type">${r.type}</span>
        <span class="tag tag-keuken">${r.keuken}</span>
        ${r.tijd ? `<span class="tag tag-tijd">${r.tijd} min</span>` : ''}
        <span class="tag tag-moei">${r.moei}</span>
      </div>
      ${r.link ? `<a href="${r.link}" target="_blank" class="recept-link-btn" onclick="event.stopPropagation()">↗ Bekijk recept</a>` : ''}
    `;
    card.onclick = () => openReceptModal(i);
    grid.appendChild(card);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-recept-btn';
  addBtn.innerHTML = '+ Recept toevoegen';
  addBtn.onclick = () => openReceptModal(null);
  grid.appendChild(addBtn);
}

function openReceptModal(idx) {
  activeReceptIdx = idx;
  const r = idx !== null ? recepten[idx] : {};
  document.getElementById('receptModalTitle').textContent = idx !== null ? 'Recept bewerken' : 'Recept toevoegen';
  document.getElementById('receptNaam').value = r.naam || '';
  document.getElementById('receptType').value = r.type || 'Diner';
  document.getElementById('receptKeuken').value = r.keuken || 'Nederlands';
  document.getElementById('receptTijd').value = r.tijd || '';
  document.getElementById('receptMoei').value = r.moei || 'Makkelijk';
  document.getElementById('receptLink').value = r.link || '';
  document.getElementById('receptFavoriet').checked = r.favoriet || false;
  document.getElementById('receptVerwijderBtn').style.display = idx !== null ? 'block' : 'none';
  document.getElementById('receptModal').classList.add('open');
}

function slaaReceptOp() {
  const r = {
    naam: document.getElementById('receptNaam').value.trim(),
    type: document.getElementById('receptType').value,
    keuken: document.getElementById('receptKeuken').value,
    tijd: parseInt(document.getElementById('receptTijd').value) || 0,
    moei: document.getElementById('receptMoei').value,
    link: document.getElementById('receptLink').value.trim(),
    favoriet: document.getElementById('receptFavoriet').checked,
  };
  if (!r.naam) return;
  if (activeReceptIdx !== null) recepten[activeReceptIdx] = r;
  else recepten.push(r);
  slaOp(); sluitModal('receptModal'); renderRecepten();
}

function verwijderRecept() {
  recepten.splice(activeReceptIdx, 1);
  slaOp(); sluitModal('receptModal'); renderRecepten();
}

function sluitModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// PINCODE
const PINCODE = '1212';
const pinVakken = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3'), document.getElementById('p4')];

if (sessionStorage.getItem('gp_toegang') === 'ja') {
  document.getElementById('pinOverlay').classList.add('verborgen');
} else {
  document.getElementById('p1').focus();
}

pinVakken.forEach((vak, i) => {
  vak.addEventListener('input', () => {
    vak.value = vak.value.replace(/[^0-9]/g, '');
    if (vak.value && i < 3) pinVakken[i + 1].focus();
    const code = pinVakken.map(v => v.value).join('');
    if (code.length === 4) {
      if (code === PINCODE) {
        sessionStorage.setItem('gp_toegang', 'ja');
        document.getElementById('pinOverlay').classList.add('verborgen');
      } else {
        document.getElementById('pinFout').textContent = 'Onjuiste pincode, probeer opnieuw';
        pinVakken.forEach(v => v.value = '');
        pinVakken[0].focus();
      }
    } else {
      document.getElementById('pinFout').textContent = '';
    }
  });
  vak.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !vak.value && i > 0) pinVakken[i - 1].focus();
  });
});

renderWeek();
renderRecepten();
</script>
</body>
</html>
